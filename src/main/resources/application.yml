spring:
  application:
    name: piingo-config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/your-org/piingo-user-service-config.git}
          default-label: ${CONFIG_REPO_BRANCH:main}
          clone-on-start: false
          force-pull: true
          timeout: 5
server:
  port: 8888
management:
  endpoints:
    web:
      exposure:
        include: health,info
