spring:
  application:
    name: piingo-config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/muditkhanna98/piingo-config.git}
          default-label: ${CONFIG_REPO_BRANCH:main}
          username: ${CONFIG_REPO_USERNAME:}
          password: ${CONFIG_REPO_PASSWORD:}
          clone-on-start: false
          force-pull: true
          timeout: 5
server:
  port: 8888
management:
  endpoints:
    web:
      exposure:
        include: health,info
